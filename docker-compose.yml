services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      # entrypoint-web.sh seeds ~/.tradingagents/.env from .env.example and links project .env
      - TRADINGAGENTS_APPDATA=/home/appuser/.tradingagents
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - TRADINGAGENTS_APPDATA=/home/appuser/.tradingagents
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
